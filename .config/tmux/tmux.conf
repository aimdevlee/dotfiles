# ================================================================
# Terminal Configuration
# ================================================================
# Enable true color support (256 colors)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable extended keys (CSI u) for Ctrl+number keybindings
set -g extended-keys on
set -as terminal-features ',*:extkeys'

# ================================================================
# General Settings
# ================================================================
# Enable mouse support for scrolling and pane selection
set -g mouse on

# Increase scrollback buffer size from default (1000) to 10000
set -g history-limit 10000

# Start window and pane indices at 1 instead of 0 (more intuitive)
set -g base-index 1
set-window-option -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Auto-name windows as: <path-basename> :: <process>
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path} :: #{pane_current_command}"

# ================================================================
# Performance and Responsiveness
# ================================================================
# Remove delay after ESC key (important for vim users)
set -sg escape-time 0

# Enable focus events for better vim/neovim integration
set -g focus-events on

# Monitor window activity (show in status bar)
setw -g monitor-activity off

# But don't show visual bell notifications
set -g visual-activity off

# ================================================================
# Copy Mode Configuration
# ================================================================
# Use vi-style key bindings in copy mode
setw -g mode-keys vi

# Vi-style selection and copy (similar to vim visual mode)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# ================================================================
# Pane Management
# ================================================================
# Split panes with more intuitive keys
bind | split-window -h
bind - split-window -v

# ================================================================
# Window Navigation
# ================================================================
# Navigate windows with vim-style keys
bind h select-window -t :-
bind l select-window -t :+

bind left select-window -t :-
bind right select-window -t :+

# Direct window switching with Ctrl+number (no prefix needed)
bind-key -n C-1 select-window -t 1
bind-key -n C-2 select-window -t 2
bind-key -n C-3 select-window -t 3
bind-key -n C-4 select-window -t 4
bind-key -n C-5 select-window -t 5
bind-key -n C-6 select-window -t 6
bind-key -n C-7 select-window -t 7
bind-key -n C-8 select-window -t 8
bind-key -n C-9 select-window -t 9
# ================================================================
# Pane Navigation and Resizing (Currently Disabled)
# ================================================================
# Uncomment to enable vim-style pane navigation with repeat (-r flag)
# bind -r h select-pane -L
# bind -r j select-pane -D
# bind -r k select-pane -U
# bind -r l select-pane -R

# Uncomment to enable pane resizing with Shift + vim keys
# bind -r H resize-pane -L 5
# bind -r J resize-pane -D 5
# bind -r K resize-pane -U 5
# bind -r L resize-pane -R 5

# Smart pane switching with awareness of Neovim splits.
bind-key -n C-h if -F "#{@pane-is-vim}" 'send-keys C-h'  'select-pane -L'
bind-key -n C-j if -F "#{@pane-is-vim}" 'send-keys C-j'  'select-pane -D'
bind-key -n C-k if -F "#{@pane-is-vim}" 'send-keys C-k'  'select-pane -U'
bind-key -n C-l if -F "#{@pane-is-vim}" 'send-keys C-l'  'select-pane -R'

bind-key -n C-Left if -F "#{@pane-is-vim}" 'send-keys C-h'  'select-pane -L'
bind-key -n C-Down if -F "#{@pane-is-vim}" 'send-keys C-j'  'select-pane -D'
bind-key -n C-Up if -F "#{@pane-is-vim}" 'send-keys C-k'  'select-pane -U'
bind-key -n C-Right if -F "#{@pane-is-vim}" 'send-keys C-l'  'select-pane -R'

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if -F \"#{@pane-is-vim}\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if -F \"#{@pane-is-vim}\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# ================================================================
# Key Unbindings
# ================================================================
# Disable suspend-client command (Ctrl-z)
unbind-key C-z

# ================================================================
# Configuration Reload
# ================================================================
# Reload tmux config with prefix + r
bind r source-file $XDG_CONFIG_HOME/tmux/tmux.conf \; display-message "Config reloaded.."

# ================================================================
# Session Management
# ================================================================
# Create new session quickly (prefix + Ctrl-n)
bind-key C-n new-session
# Switch to last session (prefix + Ctrl-l)
bind-key C-l switch-client -l
# tmux-sessionizer (prefix + s / Ctrl-f)
bind-key s display-popup -E "tmux-sessionizer"
bind-key -n C-f display-popup -E "tmux-sessionizer"


# ================================================================
# Color Palettes & Theme
# ================================================================
# --- Graphite + teal accent (AI focus) ---
set -og @bg 'default'
set -og @fg '#98a2b3'
set -og @fg-current '#e6edf3'
set -og @bg-current '#111827'
set -og @fg-session '#d0d5dd'
set -og @fg-prefix '#22d3ee'
set -og @fg-time '#38bdf8'

# ================================================================
# Status Bar Configuration (AI Coding Focus)
# ================================================================
# Update status bar every 1 second
set -g status on
set -g status-interval 1
set -g status-position 'top'
set -g status-style "bg=#{@bg},fg=#{@fg}"
set -g status-left-length 30
set -g status-right-length 80
set -g status-justify 'left'


# Left: session, or fallback label if empty
set -g status-left '#[bg=#{@bg},fg=#{@fg-session}]#{?session_name, 󰙀 #S , TMUX }'

# Right: dir + cmd + time (AI context, icons)
set -g status-right '#[bg=#{@bg},fg=#{@fg}]󰉖 #[fg=#{@fg-current}]#{b:pane_current_path} #[fg=#{@fg}]| 󰆍 #[fg=#{@fg-current}]#{pane_current_command} #[fg=#{@fg}]| #[fg=#{@fg-time}]󰥔 %H:%M '

# Window list: minimal with zoom indicator
setw -g window-status-current-format '#[bg=#{@bg},fg=#{@fg-current},bold] #I '
setw -g window-status-format '#[bg=#{@bg},fg=#{@fg}] #I '
setw -g window-status-activity-style "bg=#{@bg},fg=#{@fg-time}"
setw -g window-status-separator ' |'


# ================================================================
# Tmux Plugin Manager (TPM) and Plugins
# ================================================================
# TPM itself
set -g @plugin 'tmux-plugins/tpm'

# Session persistence and restoration
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'


# Initialize TPM (keep this line at the very bottom)
run '$HOMEBREW_PREFIX/opt/tpm/share/tpm/tpm'
